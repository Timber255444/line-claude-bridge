services:
  - type: web
    name: line-claude-bridge
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: BRIDGE_API_KEY
        sync: false
      - key: DB_PATH
        value: /tmp/line_messages.db
